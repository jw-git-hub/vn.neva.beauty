<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Neva Beauty — центр красоты в Дананге">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF4F0"/>
      <stop offset="0.55" stop-color="#F5E8E2"/>
      <stop offset="1" stop-color="#EAD4CB"/>
    </linearGradient>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CE9B91"/>
      <stop offset="1" stop-color="#92655E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <ellipse cx="880" cy="150" rx="520" ry="320" fill="url(#glow)"/>

  <!-- Arched frame echoing the site hero -->
  <g transform="translate(1000,52)">
    <path d="M0 200 A100 100 0 0 1 200 200 L200 240 Q200 260 180 260 L20 260 Q0 260 0 240 Z" fill="url(#arch)" opacity="0.28"/>
    <path d="M40 200 A60 60 0 0 1 160 200 L160 232 Q160 244 148 244 L52 244 Q40 244 40 232 Z" fill="#FBF4F0" opacity="0.55"/>
    <circle cx="100" cy="150" r="7" fill="#92655E" opacity="0.45"/>
  </g>

  <!-- Decorative rule -->
  <line x1="120" y1="120" x2="176" y2="120" stroke="#92655E" stroke-width="2"/>
  <text x="192" y="126" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="4" fill="#7D5650">СИЯНИЕ, ЗАЛОЖЕННОЕ В ВАС</text>

  <!-- Wordmark -->
  <text x="118" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="500" fill="#4A3B38">Neva Beauty</text>
  <line x1="122" y1="232" x2="162" y2="232" stroke="#B9A89A" stroke-width="2"/>
  <text x="176" y="238" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="10" fill="#92655E">DA NANG</text>

  <!-- Subtitle -->
  <text x="120" y="290" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" fill="#746762">Центр красоты в Дананге · Вьетнам</text>

  <!-- Tech chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#7D5650">
    <rect x="120" y="312" width="118" height="30" rx="15" fill="#FFFFFF" opacity="0.72"/>
    <text x="179" y="331" text-anchor="middle">Python · Jinja2</text>
    <rect x="248" y="312" width="150" height="30" rx="15" fill="#FFFFFF" opacity="0.72"/>
    <text x="323" y="331" text-anchor="middle">JSON-LD · schema.org</text>
    <rect x="408" y="312" width="118" height="30" rx="15" fill="#FFFFFF" opacity="0.72"/>
    <text x="467" y="331" text-anchor="middle">GitHub Pages</text>
    <rect x="536" y="312" width="130" height="30" rx="15" fill="#FFFFFF" opacity="0.72"/>
    <text x="601" y="331" text-anchor="middle">Lighthouse 100</text>
  </g>
</svg>
